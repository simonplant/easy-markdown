name: EasyMarkdown
options:
  bundleIdPrefix: com.easymarkdown
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  EasyMarkdown:
    path: .

targets:
  EasyMarkdownApp:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Sources/EasyMarkdownApp
    dependencies:
      - package: EasyMarkdown
        product: EMApp
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.easymarkdown.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
